<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجمل مفاجأة لأسمى</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10;
            max-width: 400px;
            width: 90%;
        }

        h1 { color: #ff4d6d; margin-bottom: 20px; }

        .surprise-btn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .surprise-btn:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #message {
            margin-top: 30px;
            display: none;
            color: #555;
            line-height: 1.6;
            font-size: 1.2rem;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* قلوب في الخلفية */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            user-select: none;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>يا ست البنات ❤️</h1>
        <p>عارف إنك مش متوقعة دي، بس حبيت أقولك حاجة بسيطة برمجتها مخصوص عشانك..</p>
        <button class="surprise-btn" onclick="showSurprise()">دوسي هنا وشوفي</button>
        
        <div id="message">
            <b>لأغلى أسمى في الدنيا،</b><br>
            كل يوم بيعدي وأنا جنبك بتأكد إنك أحسن اختيار في حياتي. ربنا يخليكي ليا ونبني بيتنا اللي بنحلم بيه سوا. <br>
            <b>بحبك جداً!</b>
        </div>
    </div>

    <script>
        function showSurprise() {
            document.getElementById('message').style.display = 'block';
            document.querySelector('.surprise-btn').style.display = 'none';
            createHearts();
        }

        function createHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
