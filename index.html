<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لأسماء</title>
    <style>
        body { margin: 0; background: #fff; font-family: 'Arial', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 90%; transition: 0.5s; }
        .active { display: flex; }
        h1 { color: #c2185b; margin-bottom: 30px; font-size: 1.8rem; }
        button { padding: 15px 30px; font-size: 1.2rem; font-weight: bold; color: #fff; background-color: #ff4d6d; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        .btn-no { background-color: #888; position: absolute; transition: 0.2s; }
        .zakri-item { position: absolute; font-weight: 900; pointer-events: none; white-space: nowrap; }
        #timer { font-size: 5rem; color: #ff4d6d; font-weight: 900; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <button onclick="showPage('page2')">دوسي هنا يا اسووم ❤️</button>
    </div>

    <div id="page2" class="page">
        <h1>عايز اقولك علي حاجة مهمه🌚</h1>
        <button onclick="showPage('page3')">دوسي هنا تاني يا اسووم 😉</button>
    </div>

    <div id="page3" class="page">
        <h1>عايزه تعرفي عايز اقولك اي؟؟!!</h1>
        <div style="height: 200px; width: 100%; position: relative;">
            <button onclick="showPage('countdown')">ايوا</button>
            <button id="run-btn" class="btn-no" onmouseover="moveBtn()" onclick="moveBtn()">لاااا</button>
        </div>
    </div>

    <div id="countdown" class="page">
        <h1>الحاجة المهمة هي...</h1>
        <div id="timer">3</div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'countdown') startTimer();
        }

        // زرار يهرب
        function moveBtn() {
            const btn = document.getElementById('run-btn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function startTimer() {
            let time = 3;
            const t = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = time;
                if(time === 0) {
                    clearInterval(t);
                    startPrank();
                }
            }, 1000);
        }

        function startPrank() {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const rows = Math.floor(window.innerHeight / 50);
            const cols = Math.floor(window.innerWidth / 100);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    setTimeout(() => {
                        const el = document.createElement('div');
                        el.className = 'zakri-item';
                        el.innerText = 'ذاااكري';
                        el.style.left = (c * 100) + 'px';
                        el.style.top = (r * 50) + 'px';
                        el.style.fontSize = '20px';
                        el.style.color = (r+c)%2 === 0 ? '#ff4d6d' : '#c2185b';
                        document.body.appendChild(el);
                    }, (r + c) * 20);
                }
            }
        }
    </script>
</body>
</html>
